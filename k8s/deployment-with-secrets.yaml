# OCI Anthropic Gateway - Kubernetes Deployment (with Secrets)
#
# Use this method if Workload Identity is not available.
# API keys are stored as Kubernetes Secrets.
#
# Prerequisites:
# 1. Create secrets first:
#    kubectl create secret generic oci-credentials \
#      --from-file=config=./docker-oci/config \
#      --from-file=api-key=./docker-oci/oci_api_key.pem
#
# 2. Update config.json in ConfigMap with your settings

apiVersion: v1
kind: ConfigMap
metadata:
  name: oci-gateway-config
data:
  config.json: |
    {
      "compartment_id": "ocid1.compartment.oc1..your-compartment-id",
      "endpoint": "https://inference.generativeai.us-chicago-1.oci.oraclecloud.com",
      "model_aliases": {
        "claude-3-5-sonnet": "xai.grok-4-fast-non-reasoning"
      },
      "model_definitions": {
        "xai.grok-4-fast-non-reasoning": {
          "ocid": "ocid1.generativeaimodel.oc1.us-chicago-1.your-model-ocid",
          "max_tokens_key": "max_tokens",
          "temperature": 0.7
        }
      },
      "default_model": "xai.grok-4-fast-non-reasoning",
      "debug": false,
      "server": {
        "host": "0.0.0.0",
        "port": 8000,
        "log_level": "warning"
      }
    }
---
# Pre-create this secret before deploying:
# kubectl create secret generic oci-credentials \
#   --from-file=config=./docker-oci/config \
#   --from-file=oci_api_key.pem=./docker-oci/oci_api_key.pem
apiVersion: v1
kind: Secret
metadata:
  name: oci-credentials
type: Opaque
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: oci-anthropic-gateway
  labels:
    app: oci-anthropic-gateway
spec:
  replicas: 2
  selector:
    matchLabels:
      app: oci-anthropic-gateway
  template:
    metadata:
      labels:
        app: oci-anthropic-gateway
    spec:
      containers:
        - name: gateway
          image: oci-anthropic-gateway:latest  # Replace with your image registry
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8000
          env:
            - name: LOG_LEVEL
              value: "WARNING"
          volumeMounts:
            - name: config-volume
              mountPath: /app/config.json
              subPath: config.json
              readOnly: true
            - name: oci-credentials
              mountPath: /root/.oci
              readOnly: true
          resources:
            requests:
              memory: "256Mi"
              cpu: "100m"
            limits:
              memory: "512Mi"
              cpu: "500m"
          livenessProbe:
            httpGet:
              path: /debug/
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /debug/
              port: 8000
            initialDelaySeconds: 5
            periodSeconds: 10
      volumes:
        - name: config-volume
          configMap:
            name: oci-gateway-config
        - name: oci-credentials
          secret:
            secretName: oci-credentials
            items:
              - key: config
                path: config
              - key: oci_api_key.pem
                path: oci_api_key.pem
---
apiVersion: v1
kind: Service
metadata:
  name: oci-anthropic-gateway
spec:
  type: ClusterIP
  ports:
    - port: 8000
      targetPort: 8000
  selector:
    app: oci-anthropic-gateway
