<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Session Swimlane</title>
  <link rel="stylesheet" href="/debug/app.css" />
  <link rel="stylesheet" href="/debug/swimlane.css" />
</head>
<body>
  <div class="header">
    <h1 id="title">Session Swimlane</h1>
    <div class="header-controls">
      <span id="connectionDot" class="status-dot disconnected">●</span>
      <span id="connectionText">Connecting...</span>
      <span id="eventCount">0 events</span>
      <span id="statusBar"></span>
      <a href="/debug/index.html">← Live Swimlane</a>
      <a href="/debug/sessions.html">Session List</a>
    </div>
  </div>

  <div class="swimlane-page">
    <div class="swimlane-container" id="swimlaneContainer">
      <!-- Swimlane SVG rendered here -->
    </div>

    <div class="resizer" id="resizer"></div>

    <div class="detail-panel" id="detailPanel">
      <div class="placeholder">Click an event node to view details</div>
    </div>
  </div>

  <script src="/debug/common.js"></script>
  <script src="/debug/swimlane.js"></script>
  <script>
    const sessionId = qs('session_id') || '';

    // Truncate session ID for display
    const displayId = sessionId.length > 30 ? sessionId.substring(0, 30) + '...' : sessionId;
    document.getElementById('title').textContent = `Session: ${displayId}`;

    // Initialize single-session swimlane timeline
    const timeline = new SwimlaneTimeline(
      sessionId,
      'swimlaneContainer',
      'detailPanel'
    );

    timeline.init().catch(err => {
      console.error('Failed to initialize timeline:', err);
      document.getElementById('statusBar').textContent = `Error: ${err.message}`;
    });

    // Update event count display
    timeline.onEventCount = (count) => {
      document.getElementById('eventCount').textContent = `${count} events`;
    };

    // Resizer drag functionality
    const resizer = document.getElementById('resizer');
    const detailPanel = document.getElementById('detailPanel');
    let isResizing = false;

    resizer.addEventListener('mousedown', (e) => {
      isResizing = true;
      resizer.classList.add('dragging');
      document.body.style.cursor = 'col-resize';
      document.body.style.userSelect = 'none';
    });

    document.addEventListener('mousemove', (e) => {
      if (!isResizing) return;

      const containerRect = document.querySelector('.swimlane-page').getBoundingClientRect();
      const newWidth = containerRect.right - e.clientX;

      if (newWidth >= 280 && newWidth <= 600) {
        detailPanel.style.width = newWidth + 'px';
      }
    });

    document.addEventListener('mouseup', () => {
      if (isResizing) {
        isResizing = false;
        resizer.classList.remove('dragging');
        document.body.style.cursor = '';
        document.body.style.userSelect = '';
        timeline.handleResize();
      }
    });

    // Cleanup on page unload
    window.addEventListener('beforeunload', () => {
      timeline.disconnect();
    });

    // Keyboard navigation
    document.addEventListener('keydown', (e) => {
      if (e.key === 'Escape') {
        timeline.selectedEventId = null;
        document.querySelectorAll('.event-node.selected').forEach(el => el.classList.remove('selected'));
      }
    });
  </script>
</body>
</html>
